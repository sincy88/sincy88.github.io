<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.8;
        }
        header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            z-index: 999;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
        }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 16px;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: #38bdf8;
            transition: width 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #38bdf8;
        }
        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }
        .contact-wrap {
            max-width: 700px;
            margin: 6rem auto;
            padding: 0 2rem;
            animation: fadeIn 1s ease;
        }
        .contact-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }
        .contact-card h2 {
            font-size: 32px;
            color: #ffffff;
            margin-bottom: 2.5rem;
        }
        .contact-item {
            font-size: 20px;
            margin: 1.5rem 0;
            color: #e2e8f0;
        }
        .contact-item strong {
            color: #38bdf8;
            font-size: 22px;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            border-top: 1px solid #1e293b;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links a {
                margin: 0 0.8rem;
            }
            .contact-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">域名交易</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="detail.html">域名详情</a>
                <a href="contact.html" class="active">联系我们</a>
            </div>
        </div>
    </header>

    <div class="contact-wrap">
        <div class="contact-card">
            <h2>咨询与联系</h2>
            <div class="contact-item">
                意向域名：<strong>hexun.com.cn</strong>
            </div>
            <div class="contact-item">
                联系邮箱：<strong>120494789@qq.com</strong>
            </div>
            <p style="margin-top: 2rem;color:#94a3b8;">有意向可发送邮件咨询价格、过户流程，看到消息会第一时间回复。</p>
        </div>
    </div>

    <footer>
        <p>专业域名交易 | 诚信为本 合作共赢</p>
    </footer>
</body>
</html>
