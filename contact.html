<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | 联系方式</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body{background:linear-gradient(120deg,#e0f0ff,#f8f2ff);min-height:100vh;color:#333;}
        nav{background:rgba(44,62,80,0.95);padding:1.2rem;box-shadow:0 3px 12px rgba(0,0,0,0.15);position:sticky;top:0;z-index:99;}
        .nav-wrap{max-width:1100px;margin:0 auto;display:flex;gap:2.5rem;flex-wrap:wrap;align-items:center;}
        .logo{color:#fff;font-size:20px;font-weight:bold;margin-right:2rem;}
        nav a{color:#ddd;text-decoration:none;font-size:16px;padding:6px 12px;border-radius:6px;transition:all 0.3s ease;}
        nav a.active{background:#3498db;color:#fff;}
        nav a:hover{background:#34495e;color:#fff;}
        .container{max-width:1100px;margin:4rem auto;padding:0 1.5rem;}
        .contact-card{background:#fff;border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,0.08);padding:3rem;max-width:700px;margin:0 auto;}
        h1{color:#2c3e50;font-size:28px;margin-bottom:2rem;border-left:5px solid #3498db;padding-left:15px;}
        .contact-line{font-size:17px;margin:1.5rem 0;color:#555;}
        .contact-line a{color:#3498db;text-decoration:none;}
    </style>
</head>
<body>
<nav>
    <div class="nav-wrap">
        <div class="logo">个人主页</div>
        <a href="index.html">首页</a>
        <a href="about.html">关于我</a>
        <a href="projects.html">项目作品</a>
        <a href="contact.html" class="active">联系方式</a>
    </div>
</nav>
<div class="container">
    <div class="contact-card">
        <h1>联系通道</h1>
        <div class="contact-line">邮箱：demo@example.com</div>
        <div class="contact-line">GitHub：<a href="#">github.com/username</a></div>
        <div class="contact-line">微信：XXXXXXX</div>
        <div class="contact-line">欢迎技术交流、项目探讨，期待与你沟通</div>
    </div>
</div>
</body>
</html>
