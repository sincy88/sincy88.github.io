<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名详情 - hexun.com.cn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.8;
        }
        header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            z-index: 999;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
        }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 16px;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: #38bdf8;
            transition: width 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #38bdf8;
        }
        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }
        .main {
            max-width: 900px;
            margin: 5rem auto;
            padding: 0 2rem;
            animation: fadeIn 1s ease;
        }
        .detail-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 3.5rem;
            border: 1px solid #334155;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            text-align: center;
        }
        .domain-title {
            font-size: 42px;
            color: #38bdf8;
            margin-bottom: 2rem;
        }
        .desc-text {
            font-size: 17px;
            color: #94a3b8;
            margin-bottom: 2rem;
            text-align: left;
        }
        .tip-box {
            background: rgba(56, 189, 248, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }
        .tip-box h3 {
            color: #38bdf8;
            margin-bottom: 0.8rem;
        }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 12px 36px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            border-top: 1px solid #1e293b;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links a {
                margin: 0 0.8rem;
            }
            .domain-title {
                font-size: 30px;
            }
            .detail-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">域名交易</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="detail.html" class="active">域名详情</a>
                <a href="contact.html">联系我们</a>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="detail-card">
            <h1 class="domain-title">hexun.com.cn</h1>
            <div class="tip-box">
                <h3>域名优势</h3>
                <p>后缀正规通用，读音顺口、记忆简单，适合搭建企业官网、品牌展示站、个人门户等各类站点，商业价值高，发展潜力大。</p>
            </div>
            <p class="desc-text">本域名现对外转让，交易流程正规，安全可靠。支持正常过户、解析、备案，到手即可使用。秉持诚信交易原则，价格可友好协商，非诚勿扰。</p>
            <a href="contact.html" class="btn">立即咨询</a>
        </div>
    </div>

    <footer>
        <p>专业域名交易 | 诚信为本 合作共赢</p>
    </footer>
</body>
</html>
