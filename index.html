<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物图片生成动态GIF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        .upload-box {
            border: 2px dashed #999;
            border-radius: 8px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            border-color: #409eff;
            background: #f8fbff;
        }
        input[type="file"] {
            display: none;
        }
        #preview {
            max-width: 300px;
            max-height: 300px;
            margin: 15px auto;
            display: none;
            border-radius: 8px;
        }
        canvas {
            display: none;
        }
        .btn {
            padding: 10px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #409eff;
            color: #fff;
            cursor: pointer;
            margin: 8px;
            transition: 0.2s;
        }
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .tip {
            color: #666;
            margin-top: 15px;
        }
        .load-tip {
            color: #ff6700;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>宠物图片 → 动态GIF生成器</h2>
        <div class="load-tip" id="libTip">正在加载工具库...</div>

        <div class="upload-box" id="uploadBox">
            <p>点击此处 上传宠物图片</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <img id="preview" alt="预览图">

        <div>
            <button class="btn" id="createGifBtn" disabled>生成动态GIF并下载</button>
        </div>
        <p class="tip">上传图片后点击按钮即可生成带动效的宠物动图</p>

        <canvas id="drawCanvas"></canvas>
    </div>

    <!-- 替换为稳定CDN，关闭多线程 -->
    <script src="https://unpkg.com/gif.js@0.2.0/dist/gif.min.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const preview = document.getElementById('preview');
        const createGifBtn = document.getElementById('createGifBtn');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const libTip = document.getElementById('libTip');

        let originImg = null;
        const CANVAS_W = 300;
        const CANVAS_H = 300;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        // 检测库是否加载完成
        window.addEventListener('load', () => {
            if (typeof GIF !== 'undefined') {
                libTip.innerText = "工具库加载完成，请上传图片";
                libTip.style.color = "#27ae60";
            } else {
                libTip.innerText = "工具库加载失败，请刷新页面重试";
            }
        });

        uploadBox.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 限制图片大小，避免过大卡死
            if (file.size > 2 * 1024 * 1024) {
                alert("图片请小于2MB，否则容易生成失败");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;

                img.onload = function() {
                    originImg = img;
                    preview.src = img.src;
                    preview.style.display = 'block';
                    createGifBtn.disabled = false;
                }
            }
            reader.readAsDataURL(file);
        });

        createGifBtn.addEventListener('click', function() {
            if (!originImg || typeof GIF === 'undefined') {
                alert("请先上传图片，或刷新页面");
                return;
            }
            createGifBtn.disabled = true;
            createGifBtn.innerText = "正在生成...";

            // 关键：workers:0 禁用多线程，线上/本地通用
            const gif = new GIF({
                workers: 0,
                quality: 10,
                width: CANVAS_W,
                height: CANVAS_H
            });

            // 减少帧数，降低运算压力
            const frameCount = 8;
            const swingRange = 6;
            const scaleMin = 0.97;
            const scaleMax = 1.01;

            try {
                for (let i = 0; i < frameCount; i++) {
                    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                    const progress = i / frameCount;

                    const offsetX = Math.sin(progress * Math.PI * 2) * swingRange;
                    const scale = scaleMin + Math.sin(progress * Math.PI * 2) * (scaleMax - scaleMin);

                    ctx.save();
                    ctx.translate(CANVAS_W/2 + offsetX, CANVAS_H/2);
                    ctx.scale(scale, scale);

                    const imgW = originImg.width;
                    const imgH = originImg.height;
                    let drawW = CANVAS_W - 20;
                    let drawH = CANVAS_H - 20;
                    let ratio = Math.min(drawW / imgW, drawH / imgH);
                    drawW = imgW * ratio;
                    drawH = imgH * ratio;

                    ctx.drawImage(originImg, -drawW / 2, -drawH / 2, drawW, drawH);
                    ctx.restore();

                    gif.addFrame(canvas, { delay: 120, copy: true });
                }

                gif.on('finished', function(blob) {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = '宠物动态图.gif';
                    a.click();

                    createGifBtn.disabled = false;
                    createGifBtn.innerText = "生成动态GIF并下载";
                });

                // 超时兜底，防止永久卡住
                setTimeout(() => {
                    createGifBtn.disabled = false;
                    createGifBtn.innerText = "生成动态GIF并下载";
                }, 15000);

                gif.render();
            } catch (err) {
                alert("生成出错：" + err.message);
                createGifBtn.disabled = false;
                createGifBtn.innerText = "生成动态GIF并下载";
            }
        });
    </script>
</body>
</html>
