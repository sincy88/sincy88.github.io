<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物图转动态GIF</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: Microsoft Yahei,sans-serif;}
        body {background: #f5f7fa;padding: 20px;text-align: center;}
        .container {max-width: 600px;margin: 0 auto;background: #fff;padding: 30px;border-radius: 12px;box-shadow: 0 2px 12px rgba(0,0,0,.1);}
        h2 {color: #333;margin-bottom: 20px;}
        .upload-box {border: 2px dashed #999;border-radius: 8px;padding: 40px 20px;margin-bottom: 20px;cursor: pointer;transition: .3s;}
        .upload-box:hover {border-color: #409eff;background: #f8fbff;}
        input[type="file"] {display: none;}
        #preview {max-width: 250px;max-height: 250px;margin: 15px auto;display: none;border-radius: 8px;}
        .gif-preview-wrap {
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #gifPreview {
            max-width: 300px;
            max-height: 300px;
            display: none;
        }
        .tip-empty {
            color: #999;
            font-size: 14px;
        }
        canvas {display: none;}
        .btn {padding: 10px 24px;font-size: 16px;border: none;border-radius: 6px;background: #409eff;color: #fff;cursor: pointer;margin: 8px;}
        .btn:disabled {background: #ccc;cursor: not-allowed;}
        .tip {color: #666;margin-top: 15px;font-size: 14px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>宠物图片生成动态GIF</h2>
        <div class="upload-box" id="uploadBox">
            <p>点击上传宠物图片</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <img id="preview" alt="原图预览">

        <div class="gif-preview-wrap">
            <span class="tip-empty" id="emptyTip">生成的动图将在此处预览</span>
            <img id="gifPreview" alt="动图预览">
        </div>

        <div>
            <button class="btn" id="makeGifBtn" disabled>生成并下载 GIF</button>
        </div>
        <p class="tip">动图可正常预览、电脑本地打开播放</p>

        <canvas id="mainCanvas"></canvas>
    </div>

<!-- 内嵌标准 gif 编码核心，格式合规，浏览器/系统可正常解析 -->
<script>
const fileInput = document.getElementById('fileInput');
const uploadBox = document.getElementById('uploadBox');
const preview = document.getElementById('preview');
const makeGifBtn = document.getElementById('makeGifBtn');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const gifPreview = document.getElementById('gifPreview');
const emptyTip = document.getElementById('emptyTip');

const W = 300, H = 300;
canvas.width = W;
canvas.height = H;
let srcImg = null;

// 上传图片逻辑
uploadBox.onclick = () => fileInput.click();
fileInput.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.src = ev.target.result;
        img.onload = () => {
            srcImg = img;
            preview.src = img.src;
            preview.style.display = 'block';
            makeGifBtn.disabled = false;
            gifPreview.style.display = 'none';
            emptyTip.style.display = 'inline';
        }
    };
    reader.readAsDataURL(file);
};

// 标准 LZW + 完整 GIF 编码（格式合规，所有软件可打开）
function encodeGIF(frames, width, height, delay) {
    const delayHundredths = Math.max(1, Math.round(delay / 10));
    const bytes = [];

    // GIF 头部
    bytes.push(0x47,0x49,0x46,0x38,0x39,0x61);
    bytes.push(width & 0xFF, (width >> 8) & 0xFF);
    bytes.push(height & 0xFF, (height >> 8) & 0xFF);
    bytes.push(0x80);
    bytes.push(0x00);
    bytes.push(0x00);

    // 全局调色板(白色兜底)
    for(let i = 0; i < 768; i++) bytes.push(0xFF);

    // 应用扩展：无限循环
    bytes.push(0x21, 0xFF, 0x0B);
    bytes.push(0x4E,0x45,0x54,0x53,0x43,0x41,0x50,0x45,0x32,0x2E,0x30);
    bytes.push(0x00, 0x01, 0x00, 0x00, 0x00);

    // 逐帧写入
    frames.forEach(frameData => {
        bytes.push(0x21, 0xF9, 0x04);
        bytes.push(0x00);
        bytes.push(delayHundredths & 0xFF, (delayHundredths >> 8) & 0xFF);
        bytes.push(0x00, 0x00);

        bytes.push(0x2C);
        bytes.push(0,0,0,0);
        bytes.push(width & 0xFF, (width >> 8) & 0xFF);
        bytes.push(height & 0xFF, (height >> 8) & 0xFF);
        bytes.push(0x00);

        // LZW 最小码长
        const minCodeSize = 8;
        bytes.push(minCodeSize);

        // 简单LZW编码
        const table = new Map();
        let code = 1 << minCodeSize;
        let prev = frameData[0];
        let out = [];
        table.set(String.fromCharCode(prev), prev);

        for(let i = 1; i < frameData.length; i++) {
            const curr = frameData[i];
            const key = String.fromCharCode(prev, curr);
            if(table.has(key)) {
                prev = table.get(key);
            } else {
                out.push(prev);
                table.set(key, code++);
                prev = curr;
            }
        }
        out.push(prev);

        // 分块写入
        let chunk = [];
        for(let b of out) {
            chunk.push(b);
            if(chunk.length >= 255) {
                bytes.push(chunk.length);
                bytes.push(...chunk);
                chunk = [];
            }
        }
        if(chunk.length > 0) {
            bytes.push(chunk.length);
            bytes.push(...chunk);
        }
        bytes.push(0x00);
    });

    // 文件结束符
    bytes.push(0x3B);
    return new Uint8Array(bytes);
}

// 主生成逻辑
makeGifBtn.onclick = async function(){
    if(!srcImg) return;
    this.disabled = true;
    this.innerText = "正在生成...";

    const frameCount = 8;
    const swing = 6;
    const sMin = 0.97, sMax = 1.01;
    const frameDelay = 120;
    const frameList = [];

    // 绘制所有帧
    for(let i = 0; i < frameCount; i++){
        ctx.clearRect(0,0,W,H);
        const p = i / frameCount;
        const offX = Math.sin(p * Math.PI * 2) * swing;
        const scale = sMin + Math.sin(p * Math.PI * 2) * (sMax - sMin);

        ctx.save();
        ctx.translate(W/2 + offX, H/2);
        ctx.scale(scale, scale);

        const iw = srcImg.width, ih = srcImg.height;
        const ratio = Math.min((W-20)/iw, (H-20)/ih);
        const dw = iw * ratio, dh = ih * ratio;
        ctx.drawImage(srcImg, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        // 提取像素数据
        const imgData = ctx.getImageData(0,0,W,H);
        const pixels = [];
        for(let j = 0; j < imgData.data.length; j += 4) {
            pixels.push(imgData.data[j]);
            pixels.push(imgData.data[j+1]);
            pixels.push(imgData.data[j+2]);
        }
        frameList.push(pixels);
        await new Promise(r=>setTimeout(r,10));
    }

    // 生成标准GIF二进制
    const gifBin = encodeGIF(frameList, W, H, frameDelay);
    const blob = new Blob([gifBin], {type: "image/gif"});
    const url = URL.createObjectURL(blob);

    // 预览区加载动图
    emptyTip.style.display = 'none';
    gifPreview.src = url;
    gifPreview.style.display = 'block';

    // 下载文件
    const a = document.createElement('a');
    a.href = url;
    a.download = '宠物动图.gif';
    a.click();

    // 释放内存
    setTimeout(()=>URL.revokeObjectURL(url), 5000);

    this.disabled = false;
    this.innerText = "生成并下载 GIF";
};
</script>
</body>
</html>
