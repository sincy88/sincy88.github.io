<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | 首页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body{background:linear-gradient(120deg,#e0f0ff,#f8f2ff);min-height:100vh;color:#333;}
        nav{background:rgba(44,62,80,0.95);padding:1.2rem;box-shadow:0 3px 12px rgba(0,0,0,0.15);position:sticky;top:0;z-index:99;}
        .nav-wrap{max-width:1100px;margin:0 auto;display:flex;gap:2.5rem;flex-wrap:wrap;align-items:center;}
        .logo{color:#fff;font-size:20px;font-weight:bold;margin-right:2rem;}
        nav a{color:#ddd;text-decoration:none;font-size:16px;padding:6px 12px;border-radius:6px;transition:all 0.3s ease;}
        nav a.active{background:#3498db;color:#fff;}
        nav a:hover{background:#34495e;color:#fff;}
        .container{max-width:1100px;margin:4rem auto;padding:0 1.5rem;}
        .home-card{background:#fff;border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,0.08);padding:3rem;text-align:center;transition:transform 0.3s;margin-bottom:3rem;}
        .home-card:hover{transform:translateY(-6px);}
        .avatar{width:120px;height:120px;border-radius:50%;border:4px solid #3498db;margin:0 auto 1.5rem;object-fit:cover;}
        h1{color:#2c3e50;font-size:32px;margin-bottom:1rem;}
        .desc{color:#666;font-size:17px;line-height:1.8;margin-bottom:2rem;max-width:600px;margin-left:auto;margin-right:auto;}
        .btn{display:inline-block;background:linear-gradient(45deg,#3498db,#2980b9);color:#fff;padding:12px 28px;border-radius:30px;text-decoration:none;font-weight:500;transition:all 0.3s;box-shadow:0 4px 12px rgba(52,152,219,0.3);}
        .btn:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(52,152,219,0.4);}
        .contact-email{color:#3498db;font-weight:500;font-size:18px;margin-top:1rem;}
    </style>
</head>
<body>
<nav>
    <div class="nav-wrap">
        <div class="logo">个人主页</div>
        <a href="index.html" class="active">首页</a>
        <a href="about.html">关于我</a>
        <a href="projects.html">项目作品</a>
        <a href="domain.html">域名</a>
        <a href="contact.html">联系方式</a>
    </div>
</nav>
<div class="container">
    <!-- 原有个人介绍板块 -->
    <div class="home-card">
        <img class="avatar" src="https://picsum.photos/id/64/120/120" alt="头像">
        <h1>你好，欢迎到访</h1>
        <p class="desc">热爱技术，专注编程开发与网页设计，不断学习探索，记录日常成长与创作成果</p>
        <a href="about.html" class="btn">了解个人详情</a>
    </div>
</div>
</body>
</html>
