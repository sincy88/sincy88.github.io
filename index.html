<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物图转动态GIF</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: Microsoft Yahei,sans-serif;}
        body {background: #f5f7fa;padding: 20px;text-align: center;}
        .container {max-width: 600px;margin: 0 auto;background: #fff;padding: 30px;border-radius: 12px;box-shadow: 0 2px 12px rgba(0,0,0,.1);}
        h2 {color: #333;margin-bottom: 20px;}
        .upload-box {border: 2px dashed #999;border-radius: 8px;padding: 40px 20px;margin-bottom: 20px;cursor: pointer;transition: .3s;}
        .upload-box:hover {border-color: #409eff;background: #f8fbff;}
        input[type="file"] {display: none;}
        #preview {max-width: 250px;max-height: 250px;margin: 15px auto;display: none;border-radius: 8px;}
        /* GIF预览区样式 */
        .gif-preview-wrap {
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #gifPreview {
            max-width: 300px;
            max-height: 300px;
            display: none;
        }
        .tip-empty {
            color: #999;
            font-size: 14px;
        }
        canvas {display: none;}
        .btn {padding: 10px 24px;font-size: 16px;border: none;border-radius: 6px;background: #409eff;color: #fff;cursor: pointer;margin: 8px;}
        .btn:disabled {background: #ccc;cursor: not-allowed;}
        .tip {color: #666;margin-top: 15px;font-size: 14px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>宠物图片生成动态GIF</h2>
        <div class="upload-box" id="uploadBox">
            <p>点击上传宠物图片</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <img id="preview" alt="原图预览">

        <!-- GIF 预览区域 -->
        <div class="gif-preview-wrap">
            <span class="tip-empty" id="emptyTip">生成的动图将在此处预览</span>
            <img id="gifPreview" alt="动图预览">
        </div>

        <div>
            <button class="btn" id="makeGifBtn" disabled>生成并下载 GIF</button>
        </div>
        <p class="tip">自动生成摇摆动图，预览后可直接下载</p>

        <canvas id="mainCanvas"></canvas>
    </div>

<script>
const fileInput = document.getElementById('fileInput');
const uploadBox = document.getElementById('uploadBox');
const preview = document.getElementById('preview');
const makeGifBtn = document.getElementById('makeGifBtn');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
// 新增预览元素
const gifPreview = document.getElementById('gifPreview');
const emptyTip = document.getElementById('emptyTip');

const W = 300, H = 300;
canvas.width = W;
canvas.height = H;
let srcImg = null;

// 上传图片
uploadBox.onclick = () => fileInput.click();
fileInput.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.src = ev.target.result;
        img.onload = () => {
            srcImg = img;
            preview.src = img.src;
            preview.style.display = 'block';
            makeGifBtn.disabled = false;
            // 重置预览区
            gifPreview.style.display = 'none';
            emptyTip.style.display = 'inline';
        }
    };
    reader.readAsDataURL(file);
};

// 简易纯JS GIF编码器
class SimpleGif {
    constructor(w, h, delay=120) {
        this.w = w;
        this.h = h;
        this.delay = Math.round(delay / 10);
        this.frames = [];
    }
    addFrame(ctx) {
        const imgData = ctx.getImageData(0,0,this.w,this.h);
        this.frames.push(imgData.data);
    }
    build() {
        const w = this.w, h = this.h;
        const delay = this.delay;
        let out = [];
        out.push(...[71,73,70,56,57,97]);
        out.push(w&0xff, w>>8&0xff, h&0xff, h>>8&0xff);
        out.push(0xf7, 0, 0);
        for(let i=0;i<768;i++) out.push(0xff);
        out.push(0x21,0xff,0x0b);
        out.push(...[78,69,84,83,67,65,80,69,50,46,48,0,1,0,0,0]);

        for(const frame of this.frames) {
            out.push(0x2c);
            out.push(0,0,0,0);
            out.push(w&0xff,w>>8&0xff,h&0xff,h>>8&0xff);
            out.push(0, delay&0xff, delay>>8&0xff, 0);
            out.push(0x02);
            for(let i=0;i<frame.length;i+=4){
                const r = frame[i], g=frame[i+1], b=frame[i+2];
                out.push(r);out.push(g);out.push(b);
            }
            out.push(0);
        }
        out.push(0x3b);
        return new Uint8Array(out);
    }
}

// 生成、预览 + 下载 GIF
makeGifBtn.onclick = async function(){
    if(!srcImg) return;
    this.disabled = true;
    this.innerText = "正在生成...";

    const gif = new SimpleGif(W, H, 120);
    const frameCount = 8;
    const swing = 6;
    const sMin = 0.97, sMax = 1.01;

    for(let i=0; i<frameCount; i++){
        ctx.clearRect(0,0,W,H);
        const p = i / frameCount;
        const offX = Math.sin(p * Math.PI * 2) * swing;
        const scale = sMin + Math.sin(p * Math.PI * 2) * (sMax - sMin);

        ctx.save();
        ctx.translate(W/2 + offX, H/2);
        ctx.scale(scale, scale);

        const iw = srcImg.width, ih = srcImg.height;
        const ratio = Math.min((W-20)/iw, (H-20)/ih);
        const dw = iw * ratio, dh = ih * ratio;
        ctx.drawImage(srcImg, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        gif.addFrame(ctx);
        await new Promise(r=>setTimeout(r,20));
    }

    // 组装GIF二进制
    const bin = gif.build();
    const blob = new Blob([bin], {type: 'image/gif'});
    const blobUrl = URL.createObjectURL(blob);

    // 展示到预览区
    emptyTip.style.display = 'none';
    gifPreview.src = blobUrl;
    gifPreview.style.display = 'block';

    // 触发下载
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = '宠物动图.gif';
    a.click();

    this.disabled = false;
    this.innerText = "生成并下载 GIF";
};
</script>
</body>
</html>
