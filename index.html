<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物图片生成动态GIF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        .upload-box {
            border: 2px dashed #999;
            border-radius: 8px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            border-color: #409eff;
            background: #f8fbff;
        }
        input[type="file"] {
            display: none;
        }
        #preview {
            max-width: 300px;
            max-height: 300px;
            margin: 15px auto;
            display: none;
            border-radius: 8px;
        }
        canvas {
            display: none;
        }
        .btn {
            padding: 10px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #409eff;
            color: #fff;
            cursor: pointer;
            margin: 8px;
            transition: 0.2s;
        }
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .tip {
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>宠物图片 → 动态GIF生成器</h2>

        <div class="upload-box" id="uploadBox">
            <p>点击此处 上传宠物图片</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- 图片预览 -->
        <img id="preview" alt="预览图">

        <div>
            <button class="btn" id="createGifBtn" disabled>生成动态GIF并下载</button>
        </div>
        <p class="tip">上传图片后点击按钮即可生成带动效的宠物动图</p>

        <!-- 绘图画布 -->
        <canvas id="drawCanvas"></canvas>
    </div>

    <!-- 引入GIF合成库 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.min.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const preview = document.getElementById('preview');
        const createGifBtn = document.getElementById('createGifBtn');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');

        let originImg = null;
        // 动图尺寸，统一固定
        const CANVAS_W = 300;
        const CANVAS_H = 300;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        // 点击区域唤起文件选择
        uploadBox.addEventListener('click', () => {
            fileInput.click();
        });

        // 监听图片上传
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;

                img.onload = function() {
                    originImg = img;
                    // 显示预览
                    preview.src = img.src;
                    preview.style.display = 'block';
                    createGifBtn.disabled = false;
                }
            }
            reader.readAsDataURL(file);
        });

        // 生成GIF：图片小幅左右摇摆 + 轻微缩放（模拟宠物小动作）
        createGifBtn.addEventListener('click', function() {
            if (!originImg) return;
            createGifBtn.disabled = true;
            createGifBtn.innerText = "正在生成...";

            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: CANVAS_W,
                height: CANVAS_H
            });

            // 生成多帧动作：左右摇摆 + 微小缩放
            const frameCount = 12;  // 总帧数
            const swingRange = 8;    // 左右摆动幅度
            const scaleMin = 0.96;  // 最小缩放
            const scaleMax = 1.02;  // 最大缩放

            for (let i = 0; i < frameCount; i++) {
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                const progress = i / frameCount;

                // 计算偏移与缩放
                const offsetX = Math.sin(progress * Math.PI * 2) * swingRange;
                const scale = scaleMin + Math.sin(progress * Math.PI * 2) * (scaleMax - scaleMin);

                ctx.save();
                // 画布中心变换，实现摇摆+缩放
                ctx.translate(CANVAS_W/2 + offsetX, CANVAS_H/2);
                ctx.scale(scale, scale);

                // 居中绘制原图
                const imgW = originImg.width;
                const imgH = originImg.height;
                // 等比例缩放到画布内
                let drawW = CANVAS_W - 20;
                let drawH = CANVAS_H - 20;
                let ratio = Math.min(drawW / imgW, drawH / imgH);
                drawW = imgW * ratio;
                drawH = imgH * ratio;

                ctx.drawImage(
                    originImg,
                    -drawW / 2,
                    -drawH / 2,
                    drawW,
                    drawH
                );
                ctx.restore();

                // 添加一帧，每帧间隔 100ms
                gif.addFrame(canvas, { delay: 100, copy: true });
            }

            // 生成完成，触发下载
            gif.on('finished', function(blob) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '宠物动态图.gif';
                a.click();

                createGifBtn.disabled = false;
                createGifBtn.innerText = "生成动态GIF并下载";
            });

            gif.render();
        });
    </script>
</body>
</html>
</script>
